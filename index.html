<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
     <div id="sidebar">
      <p>Welcome to your library.
      </p>
      <button id="addBook">Add Book</button>
     </div>
    <div class="container">
    </div>
<dialog id="dialog">
  <form method="dialog">

    <label for="bookTitle">Book title:</label>
    <input type="text" id="bookTitle" name="bookTitle" required>

    <label for="authorName">Author name:</label>
    <input type="text" id="authorName" name="authorName" required>

    <label for="numberOfPages">Number of pages:</label>
    <input type="number" id="numberOfPages" name="numberOfPages" min="1" required>

    <fieldset>
      <legend>Have you read this book?</legend>

      <input type="radio" id="readYes" name="hasRead" value="true" required>
      <label for="readYes">Yes</label>

      <input type="radio" id="readNo" name="hasRead" value="false">
      <label for="readNo">No</label>
    </fieldset>

    <div>
      <button type="button" id="cancel">Cancel</button>
      <button type="submit">Confirm</button>
    </div>

  </form>
</dialog>
<dialog id="bookmarkDialog">
  <form>
    <label>
      Bookmark page:
      <input type="number" id="bookmarkInput" min="1" required>
    </label>

    <div>
      <button type="button" id="bookmarkCancel">Cancel</button>
      <button type="submit">Save</button>
    </div>
  </form>
</dialog>
<script src="practice3.js"></script> 
</body>
</html>
